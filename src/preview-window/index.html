<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GifCap — Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
    }

    #preview-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-bar {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid #2a2a2a;
      background: #1a1a1a;
    }

    #status-text {
      font-size: 12px;
      color: #888;
      flex: 1;
    }

    .btn {
      padding: 7px 18px;
      border-radius: 7px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .btn:hover { background: #333; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    #btn-save {
      background: #00d4ff;
      color: #000;
      border-color: #00d4ff;
      font-weight: 600;
    }
    #btn-save:hover { background: #00b8e0; border-color: #00b8e0; }
    #btn-save:disabled { background: #333; color: #666; border-color: #333; }

    .btn-danger { border-color: #ff3b30; color: #ff3b30; }
    .btn-danger:hover { background: rgba(255,59,48,0.1); }
  </style>
</head>
<body>
  <div id="preview-area">
    <div class="spinner" id="spinner"></div>
  </div>
  <div id="status-bar">
    <span id="status-text">Encoding…</span>
    <button class="btn btn-danger" id="btn-discard">Discard</button>
    <button class="btn" id="btn-save" disabled>Save GIF…</button>
  </div>
  <script type="module" src="./preset-tile.ts"></script>
</body>
</html>

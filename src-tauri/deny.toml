[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Unicode-DFS-2016",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Zlib",
]
deny = [
  "GPL-2.0",
  "GPL-3.0",
  "AGPL-3.0",
  "LGPL-2.0",
  "LGPL-2.1",
  "LGPL-3.0",
]

[bans]
multiple-versions = "warn"
deny = [
  { name = "gifski" },
  { name = "imagequant" },
  { name = "imagequant-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

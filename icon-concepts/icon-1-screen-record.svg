<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="screen1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg1)"/>

  <!-- Monitor body -->
  <rect x="132" y="180" width="760" height="520" rx="40" fill="url(#screen1)" stroke="#00d4ff" stroke-width="6"/>

  <!-- Screen inner -->
  <rect x="168" y="216" width="688" height="448" rx="20" fill="#050510"/>

  <!-- Dashed selection rectangle on screen -->
  <rect x="260" y="295" width="504" height="310" rx="10" fill="none"
        stroke="#00d4ff" stroke-width="8" stroke-dasharray="24 14" opacity="0.9"/>

  <!-- Corner handles -->
  <rect x="248" y="283" width="24" height="24" rx="5" fill="#00d4ff"/>
  <rect x="752" y="283" width="24" height="24" rx="5" fill="#00d4ff"/>
  <rect x="248" y="593" width="24" height="24" rx="5" fill="#00d4ff"/>
  <rect x="752" y="593" width="24" height="24" rx="5" fill="#00d4ff"/>

  <!-- Record dot (top right of screen area) -->
  <circle cx="686" cy="450" r="52" fill="#ff3b30" filter="url(#glow1)" opacity="0.25"/>
  <circle cx="686" cy="450" r="36" fill="#ff3b30"/>

  <!-- Monitor stand -->
  <rect x="452" y="700" width="120" height="60" rx="8" fill="#0f3460"/>
  <rect x="372" y="754" width="280" height="30" rx="15" fill="#0f3460"/>

  <!-- GifCap label bottom right -->
  <rect x="548" y="630" width="264" height="56" rx="14" fill="#00d4ff"/>
  <text x="680" y="670" font-family="-apple-system, 'SF Pro Display', Arial Black, sans-serif"
        font-size="32" font-weight="800" fill="#050510" text-anchor="middle" letter-spacing="2">GifCap</text>
</svg>

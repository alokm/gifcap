<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="frame-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="frame-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="frame-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00cec9"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg2)"/>

  <!-- Back frame (red/orange) — rotated left -->
  <g transform="rotate(-14, 512, 512)" filter="url(#shadow2)">
    <rect x="188" y="244" width="420" height="536" rx="28" fill="url(#frame-a)"/>
    <!-- Film holes top -->
    <rect x="214" y="262" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <rect x="262" y="262" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <rect x="310" y="262" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <!-- Frame inner -->
    <rect x="210" y="318" width="376" height="380" rx="12" fill="rgba(0,0,0,0.2)"/>
    <!-- Simple landscape inside -->
    <rect x="210" y="530" width="376" height="168" rx="0" fill="rgba(0,0,0,0.15)"/>
    <ellipse cx="398" cy="480" rx="60" ry="60" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Middle frame (purple) — rotated right -->
  <g transform="rotate(8, 512, 512)" filter="url(#shadow2)">
    <rect x="228" y="224" width="420" height="536" rx="28" fill="url(#frame-b)"/>
    <rect x="254" y="242" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <rect x="302" y="242" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <rect x="350" y="242" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <rect x="250" y="298" width="376" height="380" rx="12" fill="rgba(0,0,0,0.2)"/>
    <rect x="250" y="510" width="376" height="168" rx="0" fill="rgba(0,0,0,0.15)"/>
    <ellipse cx="438" cy="460" rx="55" ry="55" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Front frame (teal) — straight -->
  <g filter="url(#shadow2)">
    <rect x="302" y="204" width="420" height="536" rx="28" fill="url(#frame-c)"/>
    <rect x="328" y="222" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <rect x="376" y="222" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <rect x="424" y="222" width="36" height="36" rx="8" fill="rgba(0,0,0,0.35)"/>
    <rect x="328" y="278" width="360" height="370" rx="12" fill="rgba(0,0,0,0.2)"/>
    <!-- Play arrow in center of front frame -->
    <polygon points="466,390 466,530 588,460" fill="rgba(255,255,255,0.85)"/>
  </g>

  <!-- GIF pill at bottom -->
  <rect x="352" y="798" width="320" height="72" rx="36" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="512" y="848" font-family="-apple-system, 'SF Pro Display', Arial Black, sans-serif"
        font-size="40" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">GifCap</text>
</svg>
